<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Journey</title>
    <meta name="description" content="A repository of our wedding memories, highlights, and photos.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Cinzel:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-default">
    <!-- Authentication Screen -->
    <div id="auth-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--bg-color); flex-direction: column; padding: 2rem; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
        <h1 class="auth-title" style="font-family: 'Great Vibes', cursive; color: var(--gold); margin-bottom: 0.5rem; text-align: center;">Sargun <span class="auth-ampersand" style="font-family: var(--font-heading); font-style: italic; color: var(--text-main);">&amp;</span> Swarada</h1>
        <p style="font-family: 'Cinzel', serif; margin-bottom: 2rem; color: var(--text-main); text-align: center; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem;">Please enter passcode to access</p>
        <div style="display: flex; gap: 10px; max-width: 350px; width: 100%;">
            <input type="password" id="passcode-input" placeholder="Passcode" style="flex: 1; padding: 1rem; border: 1px solid var(--nav-border); border-radius: 4px; background: transparent; color: var(--text-main); font-size: 1rem; outline: none;">
            <button onclick="checkPasscode()" class="btn btn-gold" style="padding: 1rem 1.5rem; border: none; cursor: pointer; border-radius: 4px;">Enter</button>
        </div>
        <p id="auth-error" style="color: #A12022; margin-top: 1rem; display: none; font-size: 0.9rem; font-weight: 500;">Incorrect passcode. Please try again.</p>
    </div>

    <!-- Main App Content (Hidden until authenticated) -->
    <div id="app-content" style="display: none;">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand" onclick="showHome()" style="cursor: pointer;">Our Wedding</div>
        <ul class="nav-links" id="dynamic-nav">
            <!-- Dropdowns will be dynamically injected here by app.js based on config.js -->
        </ul>
    </nav>

    <!-- Dynamic Content Wrapper -->
    <main id="main-content">
        <!-- Hero Section (Default View) -->
        <header id="home-view" class="hero view-section active">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title"
                    style="font-family: 'Great Vibes', cursive; letter-spacing: 2px;">
                    Sargun <span class="hero-ampersand"
                        style="font-family: var(--font-heading); font-style: italic; color: var(--gold);">&amp;</span>
                    Swarada
                </h1>
                <p class="hero-subtitle"
                    style="margin-bottom: 0; font-family: 'Cinzel', serif; letter-spacing: 3px; text-transform: uppercase; color: #3E2723; text-shadow: 0 1px 5px rgba(255,255,255,0.4); font-weight: bold;">
                    Relive the magic of our special day</p>
            </div>
            <p class="hero-date">6th April 2025</p>
        </header>

        <!-- Media View (Hidden until a dropdown item is clicked) -->
        <section id="media-view" class="section section-dark view-section">
            <div class="container">
                <h2 class="section-title" id="media-title">Function Name</h2>
                <p class="section-description" id="media-subtitle">Photos / Videos</p>

                <!-- Dynamic Container for YouTube, Drive Videos, or Photos -->
                <div id="media-container">
                    <!-- Content injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Lightbox for Photo Viewing -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <div class="lightbox-prev" id="lightbox-prev">&#10094;</div>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Enlarged photo">
        <div class="lightbox-next" id="lightbox-next">&#10095;</div>
        <a href="#" class="btn btn-gold lightbox-download" id="lightbox-download" download>Download High-Res</a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 GunDa Pvt. Ltd.</p>
    </footer>
    </div> <!-- End of app-content -->

    <script>
        // Authentication Logic
        function checkPasscode() {
            const input = document.getElementById('passcode-input').value;
            if (input === 'gunda0604') {
                sessionStorage.setItem('authenticated', 'true');
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else {
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('passcode-input').value = '';
            }
        }

        // Allow pressing Enter to submit
        document.getElementById('passcode-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPasscode();
            }
        });

        // Check if already authenticated on page load
        if (sessionStorage.getItem('authenticated') === 'true') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }
    </script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
