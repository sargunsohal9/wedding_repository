<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Journey</title>
    <meta name="description" content="A repository of our wedding memories, highlights, and photos.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Cinzel:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-default">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand" onclick="showHome()" style="cursor: pointer;">Our Wedding</div>
        <ul class="nav-links" id="dynamic-nav">
            <li><a href="#" onclick="showHome()">Home</a></li>
            <!-- Dropdowns will be dynamically injected here by app.js based on config.js -->
        </ul>
    </nav>

    <!-- Dynamic Content Wrapper -->
    <main id="main-content">
        <!-- Hero Section (Default View) -->
        <header id="home-view" class="hero view-section active">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title"
                    style="font-family: 'Great Vibes', cursive; font-size: 6rem; letter-spacing: 2px;">
                    Sargun <span
                        style="font-family: var(--font-heading); font-size: 3.5rem; font-style: italic; color: var(--black);">&amp;</span>
                    Swarada
                </h1>
                <p class="hero-subtitle"
                    style="margin-bottom: 0; font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 3px; text-transform: uppercase; color: #3E2723; text-shadow: 0 1px 5px rgba(255,255,255,0.4); font-weight: bold;">
                    Relive the magic of our special day</p>
            </div>
            <p class="hero-date"
                style="position: absolute; bottom: 5vh; width: 100%; text-align: center; font-family: var(--font-heading); font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); z-index: 2; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">
                6th April 2025</p>
        </header>

        <!-- Media View (Hidden until a dropdown item is clicked) -->
        <section id="media-view" class="section section-dark view-section">
            <div class="container">
                <h2 class="section-title" id="media-title">Function Name</h2>
                <p class="section-description" id="media-subtitle">Photos / Videos</p>

                <!-- Dynamic Container for YouTube, Drive Videos, or Photos -->
                <div id="media-container">
                    <!-- Content injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Lightbox for Photo Viewing -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <div class="lightbox-prev" id="lightbox-prev">&#10094;</div>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Enlarged photo">
        <div class="lightbox-next" id="lightbox-next">&#10095;</div>
        <a href="#" class="btn btn-gold lightbox-download" id="lightbox-download" download>Download High-Res</a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 GunDa Pvt. Ltd.</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
